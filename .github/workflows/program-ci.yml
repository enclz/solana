name: program-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: stable
  ANCHOR_VERSION: 1.0.1
  RUST_TOOLCHAIN: 1.89.0

jobs:
  build:
    name: anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
      - name: anchor build
        # CI doesn't deploy, so it doesn't have the project's program-ID
        # keypair; --ignore-keys lets the build proceed using declare_id!
        # from source.
        run: anchor build --ignore-keys
      - name: Verify IDL covers every program instruction
        # Anchor's macro silently drops handlers it can't parse; we shipped a
        # stale IDL once where two instructions were absent. This gate makes
        # the build fail fast if target/idl/enclz.json drifts from lib.rs.
        run: node scripts/check-idl-coverage.mjs
      - name: Build test_stubs program
        # `anchor build` only builds entries declared in Anchor.toml's
        # `[programs.*]` blocks. test_stubs is a workspace member used as a
        # CPI stand-in by litesvm tests (see programs/enclz/tests/common
        # /mod.rs::add_stub_program), and must be built explicitly. Running
        # cargo-build-sbf from the workspace root with `--manifest-path`
        # places the artifact at workspace `target/deploy/test_stubs.so`,
        # alongside enclz.so.
        run: cargo build-sbf --manifest-path test-programs/test_stubs/Cargo.toml
      - name: Upload artifacts
        # Both .so files are listed so upload-artifact's LCA pruning keeps
        # them at the artifact root (enclz.so, test_stubs.so). Downstream
        # jobs download with `path: target/deploy` to land them at the
        # location the test harness expects.
        uses: actions/upload-artifact@v4
        with:
          name: program-build
          path: |
            target/deploy/enclz.so
            target/deploy/test_stubs.so
          retention-days: 7

  test:
    name: cargo test + anchor test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
      - name: Download program build
        # programs/enclz/tests/common/mod.rs loads target/deploy/enclz.so and
        # target/deploy/test_stubs.so via litesvm. cargo's host build doesn't
        # produce those — they come from `cargo build-sbf` in the build job.
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: target/deploy
      - name: cargo test
        run: cargo test --package enclz
      - name: npm install
        run: npm ci
      - name: Generate program keypair and sync declare_id!
        # `anchor test` deploys the program to the local validator, so the
        # deploy keypair must match `declare_id!`. CI generates a fresh
        # keypair (the production program-ID keypair lives off-CI) and
        # patches the in-tree declare_id! + Anchor.toml to match. The build
        # cache may already contain a keypair from the build job — reuse it
        # if present so the .so artifact stays consistent.
        run: |
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json
          mkdir -p target/deploy
          if [ ! -f target/deploy/enclz-keypair.json ]; then
            solana-keygen new --no-bip39-passphrase --silent --outfile target/deploy/enclz-keypair.json
          fi
          PUBKEY=$(solana-keygen pubkey target/deploy/enclz-keypair.json)
          echo "Synced program ID: $PUBKEY"
          sed -i -E "s/declare_id!\\(\"[^\"]+\"\\)/declare_id!(\"$PUBKEY\")/" programs/enclz/src/lib.rs
          sed -i -E "s/^enclz = \"[^\"]+\"/enclz = \"$PUBKEY\"/" Anchor.toml
      - name: anchor test (legacy validator)
        run: anchor test --validator legacy

  coverage:
    name: tarpaulin coverage gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-tarpaulin
        # Latest cargo-tarpaulin pulls cargo-platform 0.3.3 which requires
        # rustc 1.91; we pin rustc to 1.89 (matching Anchor 1.0.1's tested
        # toolchain). taiki-e/install-action downloads a pre-built binary so
        # local rustc compatibility is irrelevant.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Download program build
        # Integration tests under programs/enclz/tests/ load
        # target/deploy/{enclz,test_stubs}.so via litesvm; tarpaulin can't
        # produce the BPF binaries itself (cargo-build-sbf is anchor's job),
        # so reuse the build job's artifact. The artifact stores .so files at
        # its root, so download into target/deploy to land them where the
        # tests expect.
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: target/deploy
      - name: Run tarpaulin
        run: |
          cargo tarpaulin \
            --packages enclz \
            --out Xml \
            --output-dir target/tarpaulin \
            --skip-clean
      - name: Enforce coverage thresholds
        # tarpaulin instruments the host build, but the integration tests
        # under programs/enclz/tests/ run the BPF binary via litesvm — so
        # instruction-handler lines look uncovered here even though the
        # 26-test suite exercises them end-to-end. Until we wire up
        # SBF-aware coverage (cargo-llvm-cov with sbpf, or the Solana fork
        # of grcov), this gate is informational. Track via tasks.md 3.4.
        continue-on-error: true
        run: node scripts/check-coverage.mjs target/tarpaulin/cobertura.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tarpaulin-coverage
          path: target/tarpaulin/cobertura.xml
          retention-days: 14

  audit:
    name: cargo audit + cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: cargo audit
        # Spec says "fail on critical CVE"; default behaviour exits non-zero
        # on advisories. --deny warnings would also fail on yanked /
        # unmaintained, which is too strict for this gate.
        run: cargo audit
      - name: cargo deny check
        run: cargo deny check

