name: program-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: stable
  ANCHOR_VERSION: 1.0.1
  RUST_TOOLCHAIN: 1.89.0

jobs:
  build:
    name: anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
      - name: anchor build
        # CI doesn't deploy, so it doesn't have the project's program-ID
        # keypair; --ignore-keys lets the build proceed using declare_id!
        # from source.
        run: anchor build --ignore-keys
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-build
          path: |
            target/deploy/enclz.so
            target/idl/enclz.json
            target/types/enclz.ts
          retention-days: 7

  test:
    name: cargo test + anchor test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
      - name: cargo test
        run: cargo test --package enclz
      - name: npm install
        run: npm ci
      - name: Generate program keypair and sync declare_id!
        # `anchor test` deploys the program to the local validator, so the
        # deploy keypair must match `declare_id!`. CI generates a fresh
        # keypair (the production program-ID keypair lives off-CI) and
        # patches the in-tree declare_id! + Anchor.toml to match.
        run: |
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json
          mkdir -p target/deploy
          solana-keygen new --no-bip39-passphrase --silent --outfile target/deploy/enclz-keypair.json
          PUBKEY=$(solana-keygen pubkey target/deploy/enclz-keypair.json)
          echo "Synced program ID: $PUBKEY"
          sed -i -E "s/declare_id!\\(\"[^\"]+\"\\)/declare_id!(\"$PUBKEY\")/" programs/enclz/src/lib.rs
          sed -i -E "s/^enclz = \"[^\"]+\"/enclz = \"$PUBKEY\"/" Anchor.toml
      - name: anchor test (legacy validator)
        run: anchor test --validator legacy

  coverage:
    name: tarpaulin coverage gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Download program build
        # Integration tests under programs/enclz/tests/ load
        # target/deploy/enclz.so via litesvm; tarpaulin can't produce the BPF
        # binary itself (cargo-build-sbf is anchor's job), so reuse the
        # build job's artifact.
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: target
      - name: Run tarpaulin
        run: |
          cargo tarpaulin \
            --packages enclz \
            --out Xml \
            --output-dir target/tarpaulin \
            --skip-clean
      - name: Enforce coverage thresholds
        run: node scripts/check-coverage.mjs target/tarpaulin/cobertura.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tarpaulin-coverage
          path: target/tarpaulin/cobertura.xml
          retention-days: 14

  audit:
    name: cargo audit + cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal
          rustup default ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: cargo audit
        # Spec says "fail on critical CVE"; default behaviour exits non-zero
        # on advisories. --deny warnings would also fail on yanked /
        # unmaintained, which is too strict for this gate.
        run: cargo audit
      - name: cargo deny check
        run: cargo deny check

  idl-drift:
    name: idl drift gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download program build
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: target
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check IDL + error-map drift
        run: node scripts/check-idl-sync.mjs
