[package]
name = "enclz"
version = "0.1.0"
description = "Enclz on-chain spend-policy enforcement program"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "enclz"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.30.1"

[dev-dependencies]
litesvm = "0.3"
litesvm-token = "0.3"
solana-sdk = "1.18"
