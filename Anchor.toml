[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
enclz = "45PiBcnkKhZbzb5GQDhJ9Rikwiz3DUzyoBwiKHbAFaLW"

[programs.devnet]
enclz = "45PiBcnkKhZbzb5GQDhJ9Rikwiz3DUzyoBwiKHbAFaLW"

[programs.mainnet]
enclz = "45PiBcnkKhZbzb5GQDhJ9Rikwiz3DUzyoBwiKHbAFaLW"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[provider.devnet]
cluster = "${QUICKNODE_DEVNET_RPC_URL}"
wallet = "./.solana/keys/devnet-deployer.json"

[provider.mainnet]
cluster = "${MAINNET_RPC_URL}"
wallet = "./.solana/keys/mainnet-deployer.json"

[scripts]
test = "npm test"

# Load the test_stubs program into the test-validator at its build-time
# address so Mocha specs can use it as a stand-in for Jupiter / Kamino.
[[test.genesis]]
address = "4PhEhEZuZbQTC7WpKS6yMoRV6ySmpXVXUvPHQ624XQDU"
program = "target/deploy/test_stubs.so"

[hooks]
