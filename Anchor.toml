[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
enclz = "Enc1zProgram11111111111111111111111111111111"

[programs.devnet]
enclz = "Enc1zProgram11111111111111111111111111111111"

[programs.mainnet]
enclz = "Enc1zProgram11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[provider.localnet]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[provider.devnet]
cluster = "${QUICKNODE_DEVNET_RPC_URL}"
wallet = "./.solana/keys/devnet-deployer.json"

[provider.mainnet]
cluster = "${MAINNET_RPC_URL}"
wallet = "./.solana/keys/mainnet-deployer.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.spec.ts"
