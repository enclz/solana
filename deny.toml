# cargo-deny policy for the Enclz program.
#
# Run via `cargo deny check`; `program-ci.yml` enforces this on every PR.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Spec wording: "cargo audit reports a critical advisory ... THEN CI fails".
# Unmaintained advisories on transitive solana / anchor dependencies aren't
# CVEs — they're maintenance signals — so we don't gate the merge on them.
# Vulnerabilities still hard-fail (cargo-deny default).
ignore = [
    "RUSTSEC-2021-0139", # ansi_term unmaintained, transitive via solana
    "RUSTSEC-2024-0388", # derivative unmaintained, transitive via anchor
    "RUSTSEC-2024-0436", # paste unmaintained, transitive via anchor / solana
    "RUSTSEC-2025-0141", # bincode unmaintained, transitive via solana
    "RUSTSEC-2025-0161", # libsecp256k1 unmaintained, transitive via solana
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "OpenSSL",
]
exceptions = []

# Skip license enforcement for our own workspace crates (marked `publish = false`).
# Third-party deps still go through the allow list above.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/solana-foundation/anchor",
    "https://github.com/anza-xyz",
    "https://github.com/solana-labs",
]
